name: Sync docs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Optional space-separated source ids to restrict the sync (e.g. 'kurrentdb go-client'). Empty = all."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: sync-docs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Sync docs (re-resolve refs)
        run: bun .github/scripts/sync-docs.js --update ${{ inputs.sources }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No upstream changes to sync."
            exit 0
          fi
          git add -A
          git commit -m "chore(docs): sync upstream docs

          Auto-generated by .github/workflows/sync.yml (run ${{ github.run_id }})."
          git push
